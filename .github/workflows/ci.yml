name: CI

on:
  push:
  pull_request:
  repository_dispatch:
    types: [copper-rs-master]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  host:
    name: Host Example Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer-plugins-bad1.0-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check host examples
        run: just check-host

  embedded:
    name: Embedded Example Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv8m.main-none-eabihf,thumbv7em-none-eabihf

      - name: Check embedded examples
        run: just check-embedded
